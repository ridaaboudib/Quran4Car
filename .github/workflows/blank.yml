name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 👇 CHANGE THIS to match your exact folder name on GitHub
    defaults:
      run:
        working-directory: ./Quran4Car 

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Assemble Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-debug-apk
        path: Quran4Car/app/build/outputs/apk/debug/app-debug.apk # 👈 Updated path
